name: Laravel Inertia CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: Environment
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      ########################################
      # Install Node
      ########################################
      - name: Install Node 20
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt install -y nodejs

      ########################################
      # Install PHP 8.5
      ########################################
      - name: Install PHP 8.5
        run: |
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt update

          sudo apt install -y \
          php8.5 php8.5-cli php8.5-mbstring php8.5-intl \
          php8.5-mysql php8.5-sqlite3 php8.5-bcmath \
          php8.5-gd php8.5-xml unzip curl rsync

      ########################################
      # Install Composer
      ########################################
      - name: Install Composer
        run: |
          curl -sS https://getcomposer.org/installer -o composer-setup.php
          php composer-setup.php --install-dir=/usr/local/bin --filename=composer

      ########################################
      # Install Backend Dependencies
      ########################################
      - name: Composer Install
        run: composer install --no-dev --optimize-autoloader

      ########################################
      # Install Frontend Dependencies
      ########################################
      - name: NPM Install
        run: npm install

      ########################################
      # Build Vite (Inertia)
      ########################################
      - name: Build Frontend Assets
        run: npm run build

      ########################################
      # Laravel Optimize
      ########################################
      - name: Laravel Optimize
        run: |
          php artisan config:cache || true
          php artisan route:cache || true
          php artisan view:cache || true

      ########################################
      # Prepare Deploy Package
      ########################################
      - name: Prepare Deploy Folder
        run: |
          mkdir deploy

          rsync -av . deploy \
          --exclude .git \
          --exclude .github \
          --exclude tests \
          --exclude node_modules \
          --exclude deploy \
          --exclude .env

      ########################################
      # Upload Artifact
      ########################################
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy/
          retention-days: 3

  deploy:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      ########################################
      # Download Artifact
      ########################################
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package
          path: deploy

      ########################################
      # Install FTP Client
      ########################################
      - name: Install lftp
        run: sudo apt install -y lftp

      ########################################
      # Deploy FTP (FIXED SYNTAX 🔥)
      ########################################
      - name: Deploy to cPanel FTP
        env:
          FTP_USERNAME: ${{ vars.FTP_USERNAME }}
          FTP_PASSWORD: ${{ vars.FTP_PASSWORD }}
          FTP_SERVER: ${{ vars.FTP_SERVER }}
          FTP_DIR: ${{ vars.FTP_DIR }}

        run: |
          lftp -e "
          set ssl:verify-certificate no;
          open ftp://${FTP_USERNAME}:${FTP_PASSWORD}@${FTP_SERVER};

          mirror -R deploy ${FTP_DIR} --delete --verbose;

          quit
          "
