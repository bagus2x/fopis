name: Laravel Inertia CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment'
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      ########################################
      # INSTALL NODE
      ########################################
      - name: Install Node 20
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt install -y nodejs
          node -v
          npm -v

      ########################################
      # INSTALL PHP 8.5
      ########################################
      - name: Install PHP 8.5
        run: |
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt update
          sudo apt install -y \
            php8.5 php8.5-cli php8.5-mbstring php8.5-intl \
            php8.5-mysql php8.5-sqlite3 php8.5-bcmath \
            php8.5-gd php8.5-xml unzip curl rsync lftp

          php -v

      ########################################
      # INSTALL COMPOSER
      ########################################
      - name: Install Composer
        run: |
          curl -sS https://getcomposer.org/installer -o composer-setup.php
          php composer-setup.php --install-dir=/usr/local/bin --filename=composer
          composer --version

      ########################################
      # INSTALL BACKEND DEPENDENCIES
      ########################################
      - name: Install PHP Dependencies
        run: composer install --no-dev --optimize-autoloader

      ########################################
      # INSTALL FRONTEND DEPENDENCIES
      ########################################
      - name: Install NPM Dependencies
        run: npm install

      ########################################
      # BUILD VITE (WAJIB UNTUK INERTIA)
      ########################################
      - name: Build Frontend
        run: npm run build

      ########################################
      # OPTIMIZE LARAVEL
      ########################################
      - name: Optimize Laravel
        run: |
          php artisan config:cache || true
          php artisan route:cache || true
          php artisan view:cache || true

  deploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      ########################################
      # INSTALL NODE
      ########################################
      - name: Install Node 20
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt install -y nodejs

      ########################################
      # INSTALL PHP 8.5
      ########################################
      - name: Install PHP 8.5
        run: |
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt update
          sudo apt install -y \
            php8.5 php8.5-cli php8.5-mbstring php8.5-intl \
            php8.5-mysql php8.5-sqlite3 php8.5-bcmath \
            php8.5-gd php8.5-xml unzip curl rsync lftp

      ########################################
      # INSTALL DEPENDENCIES
      ########################################
      - name: Install Composer
        run: |
          curl -sS https://getcomposer.org/installer -o composer-setup.php
          php composer-setup.php --install-dir=/usr/local/bin --filename=composer
          composer install --no-dev --optimize-autoloader

      - name: Install NPM
        run: |
          npm install
          npm run build

      ########################################
      # PREPARE DEPLOY FILES
      ########################################
      - name: Prepare Deploy Folder
        run: |
          mkdir deploy
          rsync -av . deploy \
            --exclude .git \
            --exclude .github \
            --exclude tests \
            --exclude node_modules \
            --exclude .env

      ########################################
      # DEPLOY VIA FTP
      ########################################
      - name: Deploy to cPanel
        run: |
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ vars.FTP_USERNAME }},${{ vars.FTP_PASSWORD }} ${{ vars.FTP_SERVER }};
          mirror -R deploy/ ${{ vars.FTP_DIR }} --delete --verbose;
          quit
          "
