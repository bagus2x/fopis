name: Laravel Inertia CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment'
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      ########################################
      # Install Node
      ########################################
      - run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt install -y nodejs

      ########################################
      # Install PHP 8.5
      ########################################
      - run: |
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt update
          sudo apt install -y \
            php8.5 php8.5-cli php8.5-mbstring php8.5-intl \
            php8.5-mysql php8.5-sqlite3 php8.5-bcmath \
            php8.5-gd php8.5-xml unzip curl rsync

      ########################################
      # Install Composer
      ########################################
      - run: |
          curl -sS https://getcomposer.org/installer -o composer-setup.php
          php composer-setup.php --install-dir=/usr/local/bin --filename=composer

      ########################################
      # Install Dependencies (BUILD ONLY)
      ########################################
      - run: |
          composer install --no-dev --optimize-autoloader
          npm install
          npm run build

      ########################################
      # Optimize Laravel
      ########################################
      - run: |
          php artisan config:cache || true
          php artisan route:cache || true
          php artisan view:cache || true

      ########################################
      # Prepare Deploy Package
      ########################################
      - run: |
          mkdir deploy
          rsync -av . deploy \
            --exclude .git \
            --exclude .github \
            --exclude tests \
            --exclude node_modules \
            --exclude .env

      - uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy/

  deploy:
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy-package
          path: ./deploy

      - name: Install FTP
        run: sudo apt install -y lftp

      - name: Upload to cPanel
        run: |
          lftp -c "
          set ssl:verify-certificate no;
          open -u ${{ vars.FTP_USERNAME }},${{ vars.FTP_PASSWORD }} ${{ vars.FTP_SERVER }};
          mirror -R deploy/ ${{ vars.FTP_DIR }} --delete --verbose;
          quit
          "
