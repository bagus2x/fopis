name: Laravel Deploy (ZIP + SSH)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Select Environment
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      ########################################
      # 1. Test SSH Connection First
      ########################################
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: 2223
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            echo "✅ SSH Connected"
            whoami
            pwd

      ########################################
      # 2. Checkout Repository
      ########################################
      - uses: actions/checkout@v4

      ########################################
      # 3. Setup PHP
      ########################################
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5.3
          extensions: mbstring, intl, bcmath, mysql, gd, xml
          coverage: none

      ########################################
      # 4. Cache Vendor
      ########################################
      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      ########################################
      # 5. Install Backend Dependencies
      ########################################
      - name: Composer Install
        run: composer install --no-dev --optimize-autoloader

      ########################################
      # 6. Setup Node
      ########################################
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      ########################################
      # 7. Build Frontend Assets
      ########################################
      - name: Build Assets
        run: |
          npm install
          npm run build

      ########################################
      # 8. Create Deployment ZIP
      ########################################
      - name: Create Deployment ZIP
        run: |
          zip -r deploy.zip . \
            -x ".git/*" ".github/*" \
               "node_modules/*" \
               "tests/*" \
               "storage/*" \
               ".env"

      ########################################
      # 9. Upload ZIP to Server
      ########################################
      - name: Upload ZIP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: 2223
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: 'deploy.zip'
          target: '${{ secrets.SSH_PATH }}'

      ########################################
      # 10. Extract & Optimize on Server
      ########################################
      - name: Extract & Optimize
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: 2223
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd ${{ secrets.SSH_PATH }}

            unzip -o deploy.zip
            rm deploy.zip

            php artisan migrate --force || true
            php artisan config:clear || true
            php artisan config:cache || true
            php artisan route:cache || true
            php artisan view:cache || true

            echo "🚀 Deploy Finished Successfully"
