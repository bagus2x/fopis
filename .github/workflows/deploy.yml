name: Laravel Deploy (ZIP Fast Method)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      ########################################
      # Checkout
      ########################################
      - uses: actions/checkout@v4

      ########################################
      # Setup PHP
      ########################################
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: mbstring, intl, bcmath, mysql, gd, xml

      ########################################
      # Cache Vendor
      ########################################
      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      ########################################
      # Install Dependencies
      ########################################
      - run: composer install --no-dev --optimize-autoloader

      ########################################
      # Setup Node
      ########################################
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      ########################################
      # Build Frontend
      ########################################
      - run: |
          npm install
          npm run build

      ########################################
      # Create ZIP
      ########################################
      - name: Create Deployment ZIP
        run: |
          zip -r deploy.zip . \
            -x ".git/*" ".github/*" \
               "node_modules/*" \
               "tests/*" \
               "storage/*" \
               ".env"

      ########################################
      # Upload ZIP
      ########################################
      - name: Upload ZIP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          source: 'deploy.zip'
          target: '${{ vars.SSH_PATH }}'

      ########################################
      # Extract + Cleanup
      ########################################
      - name: Extract on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ vars.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ vars.SSH_PATH }}
            unzip -o deploy.zip
            rm deploy.zip

            php artisan migrate --force || true
            php artisan config:cache || true
            php artisan route:cache || true
            php artisan view:cache || true
